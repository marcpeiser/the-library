default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  skills:
    - name: agent-creator
      description: Create well-formed agent definitions for the dahrk-agentic-roster library, covering frontmatter, system prompt design, trigger examples, tool selection, and color coding.
      source: https://github.com/marcpeiser/dahrk-agentic-roster/blob/main/.agents/skills/agent-creator/SKILL.md

    - name: artifact-reviewer
      description: Review and quality-check agents, skills, and commands in the dahrk-agentic-roster library against standards before adding them.
      source: https://github.com/marcpeiser/dahrk-agentic-roster/blob/main/.agents/skills/artifact-reviewer/SKILL.md

    - name: n8n-code-javascript
      description: Write JavaScript code in n8n Code nodes. Use when writing JavaScript in n8n, using $input/$json/$node syntax, making HTTP requests with $helpers, working with dates using DateTime, or troubleshooting Code node errors.
      source: https://github.com/czlonkowski/n8n-skills/blob/main/skills/n8n-code-javascript/SKILL.md

    - name: n8n-code-python
      description: Write Python code in n8n Code nodes. Use when writing Python in n8n, using _input/_json/_node syntax, working with standard library, or need to understand Python limitations in n8n Code nodes.
      source: https://github.com/czlonkowski/n8n-skills/blob/main/skills/n8n-code-python/SKILL.md

    - name: n8n-expression-syntax
      description: Validate n8n expression syntax and fix common errors. Use when writing n8n expressions, using {{}} syntax, accessing $json/$node variables, troubleshooting expression errors, or working with webhook data in workflows.
      source: https://github.com/czlonkowski/n8n-skills/blob/main/skills/n8n-expression-syntax/SKILL.md

    - name: n8n-mcp-tools-expert
      description: Expert guide for using n8n-mcp MCP tools effectively. Use when searching for nodes, validating configurations, accessing templates, managing workflows, or using any n8n-mcp tool.
      source: https://github.com/czlonkowski/n8n-skills/blob/main/skills/n8n-mcp-tools-expert/SKILL.md

    - name: n8n-node-configuration
      description: Operation-aware node configuration guidance. Use when configuring nodes, understanding property dependencies, determining required fields, or learning common configuration patterns by node type.
      source: https://github.com/czlonkowski/n8n-skills/blob/main/skills/n8n-node-configuration/SKILL.md

    - name: n8n-validation-expert
      description: Interpret validation errors and guide fixing them. Use when encountering validation errors, warnings, false positives, operator structure issues, or need help understanding validation results.
      source: https://github.com/czlonkowski/n8n-skills/blob/main/skills/n8n-validation-expert/SKILL.md

    - name: n8n-workflow-patterns
      description: Proven workflow architectural patterns from real n8n workflows. Use when building new workflows, designing workflow structure, choosing workflow patterns, or planning workflow architecture.
      source: https://github.com/czlonkowski/n8n-skills/blob/main/skills/n8n-workflow-patterns/SKILL.md

    - name: prompt-creator
      description: Create slash commands and reusable prompts for the dahrk-agentic-roster library, covering frontmatter, argument patterns, and best practices.
      source: https://github.com/marcpeiser/dahrk-agentic-roster/blob/main/.agents/skills/prompt-creator/SKILL.md

    - name: skill-creator
      description: Create SKILL.md files for the dahrk-agentic-roster library, covering skill structure, trigger descriptions, progressive disclosure, and imperative-form content.
      source: https://github.com/marcpeiser/dahrk-agentic-roster/blob/main/.agents/skills/skill-creator/SKILL.md

  agents:
    - name: bizval
      description: Business validation and strategic planning specialist. Validates business ideas with brutal honesty, data-driven research, competitive analysis, and actionable Go/Pivot/No-Go recommendations before you invest time or money.
      source: https://github.com/marcpeiser/dahrk-agentic-roster/blob/main/.claude/agents/bizval.md

    - name: support-analytics-reporter
      description: Expert data analyst transforming raw data into actionable business insights. Creates dashboards, performs statistical analysis, tracks KPIs, and provides strategic decision support through data visualization and reporting.
      source: https://github.com/marcpeiser/dahrk-agentic-roster/blob/main/.claude/agents/support-analytics-reporter.md

    - name: support-executive-summary-generator
      description: Consultant-grade AI specialist trained to think and communicate like a senior strategy consultant. Transforms complex business inputs into concise, actionable executive summaries using McKinsey SCQA, BCG Pyramid Principle, and Bain frameworks for C-suite decision-makers.
      source: https://github.com/marcpeiser/dahrk-agentic-roster/blob/main/.claude/agents/support-executive-summary-generator.md

    - name: support-finance-tracker
      description: Expert financial analyst and controller specializing in financial planning, budget management, and business performance analysis. Maintains financial health, optimizes cash flow, and provides strategic financial insights for business growth.
      source: https://github.com/marcpeiser/dahrk-agentic-roster/blob/main/.claude/agents/support-finance-tracker.md

    - name: support-infrastructure-maintainer
      description: Expert infrastructure specialist focused on system reliability, performance optimization, and technical operations management. Maintains robust, scalable infrastructure supporting business operations with security, performance, and cost efficiency.
      source: https://github.com/marcpeiser/dahrk-agentic-roster/blob/main/.claude/agents/support-infrastructure-maintainer.md

    - name: support-legal-compliance-checker
      description: Expert legal and compliance specialist ensuring business operations, data handling, and content creation comply with relevant laws, regulations, and industry standards across multiple jurisdictions.
      source: https://github.com/marcpeiser/dahrk-agentic-roster/blob/main/.claude/agents/support-legal-compliance-checker.md

    - name: support-support-responder
      description: Expert customer support specialist delivering exceptional customer service, issue resolution, and user experience optimization. Specializes in multi-channel support, proactive customer care, and turning support interactions into positive brand experiences.
      source: https://github.com/marcpeiser/dahrk-agentic-roster/blob/main/.claude/agents/support-support-responder.md
  prompts: []
